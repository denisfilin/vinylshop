<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админка | Vinyl Shop</title>
  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: 40px auto;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
    }

    .product {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
    }

    img {
      max-width: 120px;
      display: block;
      margin-bottom: 10px;
    }

    #adminPanel {
      display: none;
    }

    #loginBox {
      text-align: center;
      margin-top: 100px;
    }
  </style>
</head>
<body>

<div id="loginBox">
  <h2>Введите пароль</h2>
  <input type="password" id="password" placeholder="Пароль" />
  <button onclick="checkPassword()">Войти</button>
</div>

<div id="adminPanel">

<h1>Админ-панель</h1>

<h2>Добавить товар</h2>

<input id="title" placeholder="Название" />
<input id="price" placeholder="Цена" />
<input id="category" placeholder="Категория" />
<textarea id="description" placeholder="Описание"></textarea>
<input id="image" placeholder="Ссылка на изображение" />

<button onclick="addProduct()">Добавить</button>

<hr>

<h2>Список товаров</h2>
<div id="products"></div>

</div>

<script>
const ADMIN_PASSWORD = "vinyl2026"; // ← поменяй пароль здесь

function checkPassword() {
  const input = document.getElementById('password').value;

  if (input === ADMIN_PASSWORD) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadProducts();
  } else {
    alert("Неверный пароль");
  }
}

async function loadProducts() {
  const res = await fetch('/api/products');
  const data = await res.json();

  const container = document.getElementById('products');
  container.innerHTML = '';

  data.forEach(product => {
    container.innerHTML += `
      <div class="product">
        <strong>${product.title}</strong><br>
        Цена: ${product.price}<br>
        Категория: ${product.category}<br>
        <img src="${product.image}" />
        <button onclick="deleteProduct(${product.id})">
          Удалить
        </button>
      </div>
    `;
  });
}

async function addProduct() {
  const title = document.getElementById('title').value.trim();
  const price = document.getElementById('price').value.trim();
  const category = document.getElementById('category').value.trim();
  const description = document.getElementById('description').value.trim();
  const image = document.getElementById('image').value.trim();

  if (!title || !price) {
    alert("Название и цена обязательны");
    return;
  }

  const res = await fetch('/api/add-product', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, price, category, description, image })
  });

  const result = await res.json();

  if (result.success) {
    alert("Товар добавлен");
    loadProducts();
  } else {
    alert("Ошибка добавления");
  }
}

async function deleteProduct(id) {
  if (!confirm("Удалить товар?")) return;

  const res = await fetch(`/api/delete-product?id=${id}`, {
    method: 'DELETE'
  });

  const result = await res.json();

  if (result.success) {
    alert("Товар удалён");
    loadProducts();
  } else {
    alert("Ошибка удаления");
  }
}
</script>

</body>
</html>
