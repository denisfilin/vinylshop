<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vinyl Shop Admin</title>
</head>
<body>

<h1>Vinyl Shop — Админ-панель</h1>

<h2>Добавить товар</h2>

<input id="title" placeholder="Название"><br><br>
<input id="price" placeholder="Цена"><br><br>
<input id="category" placeholder="Категория"><br><br>
<textarea id="description" placeholder="Описание"></textarea><br><br>
<input id="image" placeholder="URL изображения"><br><br>

<button onclick="addProduct()">Добавить товар</button>

<hr>

<h2>Список товаров</h2>
<ul id="products"></ul>

<script>
async function loadProducts() {
  const res = await fetch('/api/products');
  const products = await res.json();

  const list = document.getElementById('products');
  list.innerHTML = "";

  products.forEach(p => {
    const li = document.createElement('li');
    li.innerHTML = `
      <b>${p.title}</b> — ${p.price} (${p.category})
      <br>
      <button onclick="deleteProduct(${p.id})">Удалить</button>
      <hr>
    `;
    list.appendChild(li);
  });
}

async function addProduct() {
  const title = document.getElementById('title').value;
  const price = document.getElementById('price').value;
  const category = document.getElementById('category').value;
  const description = document.getElementById('description').value;
  const image = document.getElementById('image').value;

  await fetch('/api/add-product', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, price, category, description, image })
  });

  loadProducts();
}

async function deleteProduct(id) {
  await fetch('/api/delete-product?id=' + id);
  loadProducts();
}

loadProducts();
</script>

</body>
</html>
