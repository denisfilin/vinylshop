<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Корзина</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">

<style>
.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
}

.top-bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  filter:brightness(0.5);
  z-index:-1;
}

.container{
  max-width:900px;
  margin:120px auto;
  padding:20px;
}

.item{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:25px;
  margin-bottom:20px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.total{
  font-size:22px;
  margin-top:30px;
}
</style>
</head>

<body>

<div class="top-bg"></div>

<div class="container">
  <h1>Ваша корзина</h1>
  <div id="cartItems"></div>
  <div class="total" id="totalPrice"></div>
  <button onclick="window.location.href='index.html'">← Назад</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("vinylCart")) || [];

function renderCart(){
  let total=0;
  const container=document.getElementById("cartItems");
  container.innerHTML="";

  cart.forEach((item,index)=>{
    total+=Number(item.price);

    container.innerHTML+=`
      <div class="item">
        <h3>${item.title}</h3>
        <p>${item.description || ""}</p>
        <p>${item.price} ₽</p>
        <button onclick="removeItem(${index})">Удалить</button>
      </div>
    `;
  });

  document.getElementById("totalPrice").innerText="Итого: "+total+" ₽";
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("vinylCart",JSON.stringify(cart));
  renderCart();
}

renderCart();
</script>

</body>
</html>
