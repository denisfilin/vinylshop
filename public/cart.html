<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Корзина</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
}

.top-bg{
  position:fixed;
  inset:0;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  filter:brightness(0.5);
  z-index:-1;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  z-index:100;
}

.logo{
  height:80px;
  width:80px;
  border-radius:50%;
  object-fit:cover;
  cursor:pointer;
}

/* CONTENT */
.container{
  max-width:900px;
  margin:160px auto 120px auto;
  padding:20px;
}

/* CART ITEM */
.item{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:25px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.item img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:15px;
}

.qty{
  display:flex;
  gap:10px;
  align-items:center;
  margin:10px 0;
}

button{
  padding:6px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.total{
  font-size:22px;
  margin-top:30px;
}

/* ORDER FORM */
.order-form{
  margin-top:50px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:25px;
}

.order-form h2{
  margin-top:0;
}

.order-form input,
.order-form select{
  width:100%;
  padding:12px;
  margin:10px 0 20px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
}

.order-form button{
  width:100%;
  padding:14px;
  font-size:18px;
  background:#ff4c4c;
  color:#fff;
  font-weight:600;
}
</style>
</head>

<body>

<div class="top-bg"></div>

<header>
  <img src="/logo.png" class="logo" onclick="window.location.href='index.html'">
</header>

<div class="container">
  <h1>Ваша корзина</h1>

  <div id="cartItems"></div>
  <div class="total" id="totalPrice"></div>

  <!-- ORDER BLOCK -->
  <div class="order-form">
    <h2>Оформление заказа</h2>

    <input type="text" id="fullName" placeholder="ФИО">
    <input type="email" id="email" placeholder="E-mail">
    <input type="tel" id="phone" placeholder="+7XXXXXXXXXX">
    
    <select id="delivery">
      <option value="">Выберите доставку</option>
      <option value="ozon">ОЗОН</option>
      <option value="cdek">СДЭК</option>
    </select>

    <button onclick="createOrder()">Создать заказ</button>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("vinylCart")) || [];

function renderCart(){
  let total = 0;
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  cart.forEach((item,index)=>{
    const qty = item.quantity || 1;
    const sum = item.price * qty;
    total += sum;

    container.innerHTML += `
      <div class="item">
        <div>
          <h3>${item.title}</h3>
          <p>${item.price} ₽</p>

          <div class="qty">
            <button onclick="changeQuantity(${index},-1)">−</button>
            <strong>${qty}</strong>
            <button onclick="changeQuantity(${index},1)">+</button>
          </div>

          <p>Сумма: ${sum} ₽</p>
          <button onclick="removeItem(${index})">Удалить</button>
        </div>

        <img src="${item.image}" alt="${item.title}">
      </div>
    `;
  });

  document.getElementById("totalPrice").innerText = "Итого: " + total + " ₽";
}

function changeQuantity(index,delta){
  cart[index].quantity += delta;
  if(cart[index].quantity <= 0){
    cart.splice(index,1);
  }
  localStorage.setItem("vinylCart",JSON.stringify(cart));
  renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("vinylCart",JSON.stringify(cart));
  renderCart();
}

function createOrder(){
  const fullName = fullNameInput.value.trim();
  const email = emailInput.value.trim();
  const phone = phoneInput.value.trim();
  const delivery = deliverySelect.value;

  if(!fullName){
    alert("Введите ФИО");
    return;
  }

  if(!/^\S+@\S+\.\S+$/.test(email)){
    alert("Введите корректный e-mail");
    return;
  }

  if(!/^\+7\d{10}$/.test(phone)){
    alert("Телефон должен быть в формате +7XXXXXXXXXX");
    return;
  }

  if(!delivery){
    alert("Выберите способ доставки");
    return;
  }

  const order = {
    customer: { fullName, email, phone },
    delivery,
    items: cart,
    total: cart.reduce((s,i)=>s+i.price*(i.quantity||1),0),
    date: new Date().toISOString()
  };

  console.log("ORDER:", order);
  alert("Заказ создан! Проверьте консоль.");

  localStorage.removeItem("vinylCart");
  cart = [];
  renderCart();
}

/* shortcuts */
const fullNameInput = document.getElementById("fullName");
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const deliverySelect = document.getElementById("delivery");

renderCart();
</script>

</body>
</html>
