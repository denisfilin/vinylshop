<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Stripe -->
<script src="https://js.stripe.com/v3/"></script>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --card:rgba(255,255,255,0.06);
  --glass:rgba(255,255,255,0.08);
}
body.light{
  --bg:#f5f5f7;
  --text:#111;
  --card:rgba(0,0,0,0.05);
  --glass:rgba(255,255,255,0.7);
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  transition:0.4s;
  overflow-x:hidden;
}

/* 🎬 HERO VIDEO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.8));
  z-index:-1;
}

/* 🌊 PARALLAX LAYERS */
.parallax-layer{
  position:absolute;
  width:120%;
  height:120%;
  top:-10%;
  left:-10%;
  pointer-events:none;
  transition:transform 0.1s linear;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:100;
}
.logo{
  height:70px;
  border-radius:50%;
  object-fit:cover;
}
.controls{
  display:flex;
  gap:15px;
  margin-right:80px;
}

/* 🎧 3D VINYL + TONEARM */
.player{
  position:relative;
  margin-top:40px;
  width:220px;
  height:220px;
}
.vinyl{
  width:220px;
  height:220px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 40%),
    radial-gradient(circle at center, #c00 10%, #111 11%, #000 60%);
  animation:spin 6s linear infinite;
}
.tonearm{
  position:absolute;
  width:160px;
  height:6px;
  background:#ccc;
  top:20px;
  left:110px;
  transform-origin:left center;
  transform:rotate(35deg);
  border-radius:4px;
  transition:transform 1s ease;
}
.tonearm.play{
  transform:rotate(20deg);
}
.tonearm::after{
  content:"";
  position:absolute;
  right:-10px;
  top:-6px;
  width:18px;
  height:18px;
  background:#888;
  border-radius:50%;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

/* CATALOG */
.section{padding:100px 5%;}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:40px;
  justify-items:center;
}
.card{
  width:200px;
  background:var(--card);
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  opacity:0;
  transform:translateY(40px);
  transition:0.5s;
}
.card.show{
  opacity:1;
  transform:translateY(0);
}
.card img{width:100%;border-radius:12px;}

/* 🛒 APPLE-STYLE DRAWER */
.cart-drawer{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:var(--bg);
  box-shadow:-10px 0 40px rgba(0,0,0,0.6);
  padding:30px;
  transition:0.4s;
  z-index:200;
}
.cart-drawer.open{right:0;}
.checkout-btn{
  margin-top:20px;
  padding:12px;
  border:none;
  background:#635bff;
  color:#fff;
  border-radius:12px;
  cursor:pointer;
}
.sbp-btn{
  margin-top:10px;
  padding:12px;
  border:none;
  background:#21a038;
  color:#fff;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <img src="/logo.png" class="logo">
  <div class="controls">
    <button onclick="toggleLang()">RU / EN</button>
    <button onclick="toggleTheme()">🌗</button>
    <button onclick="toggleCart()">🛒</button>
  </div>
</header>

<section class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-dj-spinning-record-1571/1080p.mp4" type="video/mp4">
  </video>

  <div class="player">
    <div class="vinyl"></div>
    <div class="tonearm" id="tonearm"></div>
  </div>

  <h1 id="heroTitle">Музыка. Стиль. Атмосфера.</h1>
</section>

<section class="section">
  <h2 id="catalogTitle">Каталог</h2>
  <div class="products" id="products"></div>
</section>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cartDrawer">
  <h2>Корзина</h2>
  <div id="cartItems"></div>
  <button class="checkout-btn" onclick="checkoutStripe()">Оплатить картой</button>
  <button class="sbp-btn" onclick="paySBP()">Оплатить через СБП</button>
</div>

<script>
let cart=[];
let stripe=Stripe("pk_test_YOUR_PUBLIC_KEY"); // заменить

function toggleTheme(){document.body.classList.toggle('light');}
function toggleLang(){}
function toggleCart(){
  document.getElementById("cartDrawer").classList.toggle("open");
}

async function loadProducts(){
  const res=await fetch('/api/products');
  const data=await res.json();
  const container=document.getElementById('products');

  data.forEach((product,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <img src="${product.image}">
      <h3>${product.name}</h3>
      <p>${product.price} ₽</p>
      <button onclick='addToCart(${JSON.stringify(product)})'>+</button>
    `;
    container.appendChild(card);
    setTimeout(()=>card.classList.add('show'),i*120);
  });
}

function addToCart(product){
  cart.push(product);
  document.getElementById("tonearm").classList.add("play");
  renderCart();
}

function renderCart(){
  const el=document.getElementById("cartItems");
  el.innerHTML=cart.map(p=>`<p>${p.name} — ${p.price} ₽</p>`).join("");
}

async function checkoutStripe(){
  const res=await fetch("/api/create-checkout-session",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({items:cart})
  });
  const session=await res.json();
  stripe.redirectToCheckout({sessionId:session.id});
}

function paySBP(){
  window.open("https://www.sberbank.ru/ru/person/payments/sbp","_blank");
}

loadProducts();

/* 🌊 PARALLAX */
document.addEventListener("mousemove",e=>{
  const x=(e.clientX/window.innerWidth-0.5)*20;
  const y=(e.clientY/window.innerHeight-0.5)*20;
  document.querySelector(".player").style.transform=
    `rotateY(${x}deg) rotateX(${-y}deg)`;
});
</script>

</body>
</html>
