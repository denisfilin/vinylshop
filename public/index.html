<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --glass:rgba(0,0,0,0.6);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:#000;
  overflow-x:hidden;
}

.top-bg{
  position:fixed;
  inset:0;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  filter:brightness(0.5);
  z-index:-1;
}

header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.logo{
  height:80px;
  width:80px;
  border-radius:50%;
  object-fit:cover;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* 🔥 ПЛАСТИНКА */

.vinyl{
  width:220px;
  height:220px;
  border-radius:50%;
  margin-top:40px;
  position:relative;

  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 40%),
    radial-gradient(circle at center, #111 11%, #000 60%);

  box-shadow:
    inset 0 0 40px rgba(255,255,255,0.2),
    0 0 60px rgba(255,255,255,0.3);

  animation:spin 8s linear infinite;
}

/* ЛОГО В ЦЕНТРЕ ПЛАСТИНКИ */

.vinyl img{
  position:absolute;
  width:80px;
  height:80px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  object-fit:cover;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* PRODUCTS */

.products{
  padding:120px 5%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:40px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:25px;
  text-align:center;
  position:relative;
  transition:.4s ease;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.card img{
  width:100%;
  border-radius:18px;
}

button{
  margin-top:10px;
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.tooltip{
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:12px;
  border-radius:12px;
  width:220px;
  font-size:13px;
  opacity:0;
  transition:.3s ease;
}

.card:hover .tooltip{
  opacity:1;
}

/* КОРЗИНА */

.cart{
  position:fixed;
  bottom:30px;
  right:30px;
  width:75px;
  height:75px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-weight:bold;
  font-size:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  transition:.3s ease;
}

.cart:hover{
  transform:scale(1.1);
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-8px;
  background:red;
  color:#fff;
  font-size:14px;
  width:26px;
  height:26px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="top-bg"></div>

<header>
<img src="/logo.png" class="logo">
</header>

<section class="hero">

<h1>Music. Style. Atmosphere.</h1>

<div class="vinyl">
<img src="/logo.png">
</div>

</section>

<section class="products" id="products"></section>

<div class="cart" onclick="window.location.href='cart.html'">
🛒
<div class="cart-count" id="cartCount">0</div>
</div>

<script>

const SUPABASE_URL = "https://rmtcrasayikidqklhyfo.supabase.co"
const SUPABASE_KEY = "sb_publishable_LaKsiiHyowziPgGTl5CdWA_beMfguyx"

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let cart = JSON.parse(localStorage.getItem("vinylCart")) || []

updateCartCount()

/* Загрузка товаров из Supabase */

async function loadProducts(){

try{

const { data, error } = await supabaseClient
.from("products")
.select("*")

if(error){
console.error("Supabase error:", error)
return
}

const container = document.getElementById("products")
container.innerHTML=""

data.forEach(product=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${product.image}">
<h3>${product.title}</h3>
<p>${product.price} ₽</p>
<div class="tooltip">${product.description || ""}</div>
<button onclick='addToCart(${JSON.stringify(product)})'>+</button>
`

container.appendChild(card)

})

}catch(e){

console.log("Connection error", e)

}

}

/* Корзина */

function addToCart(product){

cart.push(product)

localStorage.setItem("vinylCart",JSON.stringify(cart))

updateCartCount()

}

function updateCartCount(){

document.getElementById("cartCount").innerText = cart.length

}

loadProducts()

</script>



<script src="js/products.js" defer></script>

</body>
</html>
