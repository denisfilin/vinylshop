<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --card:rgba(255,255,255,0.06);
  --glass:rgba(255,255,255,0.08);
}
body.light{
  --bg:#f5f5f7;
  --text:#111;
  --card:rgba(0,0,0,0.05);
  --glass:rgba(255,255,255,0.7);
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  transition:0.4s;
  overflow-x:hidden;
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.loader.hidden{
  opacity:0;
  pointer-events:none;
  transition:1s;
}
.loader-vinyl{
  width:140px;
  height:140px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 40%),
    radial-gradient(circle at center, #c00 12%, #111 13%, #000 60%);
  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.2),
    0 0 40px rgba(255,255,255,0.3);
  animation:spin 2s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* TOP BG */
.top-bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:600px;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  z-index:-1;
  filter:brightness(0.6);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:100;
}
.logo{
  height:80px;
}
.controls{
  display:flex;
  gap:15px;
  margin-right:80px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
.hero h1{
  font-size:48px;
  margin-bottom:30px;
}
.vinyl{
  margin-top:40px;
  width:180px;
  height:180px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 40%),
    radial-gradient(circle at center, #c00 10%, #111 11%, #000 60%);
  box-shadow:0 0 40px rgba(255,255,255,0.2);
  animation:spin 8s linear infinite;
}

/* CATALOG */
.section{padding:100px 5%;}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:40px;
  justify-items:center;
}
.card{
  width:200px;
  background:var(--card);
  padding:20px;
  border-radius:20px;
  text-align:center;
  backdrop-filter:blur(20px);
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
}
.card.show{
  opacity:1;
  transform:translateY(0);
}
.card img{
  width:100%;
  border-radius:12px;
}

/* FLOATING CART + SBP */
.cart,
.sbp{
  position:fixed;
  bottom:30px;
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.3s;
}
.cart{
  right:30px;
  background:#fff;
  color:#000;
}
.sbp{
  right:120px;
  background:#21a038;
  color:#fff;
}
.cart:hover,
.sbp:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="loader" id="loader">
  <div class="loader-vinyl"></div>
</div>

<div class="top-bg"></div>

<header>
  <img src="/logo.png" class="logo">
  <div class="controls">
    <button onclick="toggleLang()">RU / EN</button>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<section class="hero">
  <h1 id="heroTitle">Музыка. Стиль. Атмосфера.</h1>
  <div class="vinyl"></div>
</section>

<section class="section">
  <h2 id="catalogTitle">Каталог</h2>
  <div class="products" id="products"></div>
</section>

<!-- 🟢 SBP -->
<div class="sbp" onclick="paySBP()">СБП</div>

<!-- 🛒 CART -->
<div class="cart" onclick="openCart()">🛒</div>

<script>
let cart = JSON.parse(localStorage.getItem("vinylCart")) || [];
let currentLang='ru';

updateCartUI();

const translations={
  ru:{hero:"Музыка. Стиль. Атмосфера.",catalog:"Каталог"},
  en:{hero:"Music. Style. Atmosphere.",catalog:"Catalog"}
};

function toggleLang(){
  currentLang=currentLang==='ru'?'en':'ru';
  document.getElementById('heroTitle').innerText=translations[currentLang].hero;
  document.getElementById('catalogTitle').innerText=translations[currentLang].catalog;
}

function toggleTheme(){
  document.body.classList.toggle('light');
}

async function loadProducts(){
  const res=await fetch('/api/products');
  const data=await res.json();
  const container=document.getElementById('products');

  data.forEach((product,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <img src="${product.image}">
      <h3>${product.name}</h3>
      <p>${product.price} ₽</p>
      <button onclick='addToCart(${JSON.stringify(product)})'>+</button>
    `;
    container.appendChild(card);
    setTimeout(()=>card.classList.add('show'),i*120);
  });

  setTimeout(()=>{
    document.getElementById('loader').classList.add('hidden');
  },800);
}

function addToCart(product){
  cart.push(product);
  saveCart();
  updateCartUI();
}

function saveCart(){
  localStorage.setItem("vinylCart", JSON.stringify(cart));
}

function updateCartUI(){
  document.querySelector('.cart').innerText="🛒 "+cart.length;
}

function openCart(){
  alert("Товаров в корзине: "+cart.length);
}

function paySBP(){
  window.open("https://www.sberbank.ru/ru/person/payments/sbp", "_blank");
}

loadProducts();
</script>

</body>
</html>
