<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">

<style>
:root{
  --glass:rgba(0,0,0,0.6);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

.top-bg{
  position:fixed;
  inset:0;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  filter:brightness(0.5);
  z-index:-1;
}

header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  display:flex;
  align-items:center;
  z-index:100;
}

.logo{
  height:80px;
  width:80px;
  border-radius:50%;
  object-fit:cover;
}

.products{
  padding:160px 5%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:40px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:25px;
  text-align:center;
  transition:.4s ease;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.card img{
  width:100%;
  border-radius:18px;
}

button{
  margin-top:10px;
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.cart{
  position:fixed;
  bottom:30px;
  right:30px;
  width:75px;
  height:75px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-weight:bold;
  font-size:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  transition:.3s ease;
}

.cart:hover{
  transform:scale(1.1);
}

.cart-count{
  position:absolute;
  top:-8px;
  right:-8px;
  background:red;
  color:#fff;
  font-size:14px;
  width:26px;
  height:26px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="top-bg"></div>

<header>
  <img src="/logo.png" class="logo">
</header>

<section class="products" id="products"></section>

<div class="cart" onclick="window.location.href='cart.html'">
  🛒
  <div class="cart-count" id="cartCount">0</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("vinylCart")) || [];
updateCartCount();

async function loadProducts(){
  const res = await fetch('/api/products');
  const data = await res.json();
  const container = document.getElementById('products');
  container.innerHTML="";

  data.forEach(product=>{
    const card=document.createElement('div');
    card.className="card";

    card.innerHTML=`
      <img src="${product.image}">
      <h3>${product.title}</h3>
      <p>${product.price} ₽</p>
      <button onclick='addToCart(${JSON.stringify(product)})'>+</button>
    `;
    container.appendChild(card);
  });
}

function addToCart(product){
  const existing = cart.find(item => item.id === product.id);

  if(existing){
    existing.quantity += 1;
  } else {
    product.quantity = 1;
    cart.push(product);
  }

  localStorage.setItem("vinylCart", JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount(){
  const total = cart.reduce((sum,item)=>sum+(item.quantity||1),0);
  document.getElementById("cartCount").innerText = total;
}

loadProducts();
</script>

</body>
</html>
