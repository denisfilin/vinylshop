<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --card:rgba(255,255,255,0.06);
  --glass:rgba(255,255,255,0.08);
}

body.light{
  --bg:#f5f5f7;
  --text:#111;
  --card:rgba(0,0,0,0.05);
  --glass:rgba(255,255,255,0.7);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  transition:0.4s;
  overflow-x:hidden;
}

/* TOP BACKGROUND BLOCK */
.top-bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:600px;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  z-index:-1;
  filter:brightness(0.6);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  z-index:100;
}

.logo{
  height:80px;
}

.controls{
  display:flex;
  gap:15px;
}

button{
  padding:8px 14px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-size:48px;
  margin-bottom:30px;
}

/* CATALOG */
.section{
  padding:100px 5%;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:40px;
  justify-items:center;
}

/* Увеличены в 2 раза */
.card{
  width:200px;
  background:var(--card);
  padding:20px;
  border-radius:20px;
  text-align:center;
  backdrop-filter:blur(20px);
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card:hover{
  transform:translateY(-8px);
}

.card img{
  width:100%;
  border-radius:12px;
}

.card h3{
  margin:10px 0 5px;
  font-size:18px;
}

.card p{
  font-size:16px;
  opacity:0.7;
}

/* FLOATING CART */
.cart{
  position:fixed;
  right:30px;
  bottom:30px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.3s;
}

.cart:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="top-bg"></div>

<header>
  <img src="/logo.png" class="logo">

  <div class="controls">
    <button onclick="toggleLang()">RU / EN</button>
    <button onclick="toggleTheme()">🌗</button>
  </div>
</header>

<section class="hero">
  <h1 id="heroTitle">Музыка. Стиль. Атмосфера.</h1>
</section>

<section class="section">
  <h2 id="catalogTitle">Каталог</h2>
  <div class="products" id="products"></div>
</section>

<div class="cart" onclick="openCart()">
🛒
</div>

<script>
let cart=[];
let currentLang='ru';

const translations={
  ru:{
    hero:"Виниловая эстетика",
    catalog:"Каталог"
  },
  en:{
    hero:"Music. Style. Atmosphere.",
    catalog:"Catalog"
  }
};

function toggleLang(){
  currentLang=currentLang==='ru'?'en':'ru';
  document.getElementById('heroTitle').innerText=translations[currentLang].hero;
  document.getElementById('catalogTitle').innerText=translations[currentLang].catalog;
}

function toggleTheme(){
  document.body.classList.toggle('light');
}

async function loadProducts(){
  const res=await fetch('/api/products');
  const data=await res.json();
  const container=document.getElementById('products');

  data.forEach((product,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <img src="${product.image}">
      <h3>${product.name}</h3>
      <p>${product.price} ₽</p>
      <button onclick='addToCart(${JSON.stringify(product)})'>+</button>
    `;
    container.appendChild(card);

    setTimeout(()=>card.classList.add('show'),i*100);
  });
}

function addToCart(product){
  cart.push(product);
  document.querySelector('.cart').innerText="🛒 "+cart.length;
}

function openCart(){
  alert("Товаров в корзине: "+cart.length);
}

loadProducts();
</script>

</body>
</html>
