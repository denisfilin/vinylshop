<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --card:rgba(255,255,255,0.06);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  backdrop-filter:blur(25px);
  background:rgba(0,0,0,0.6);
  z-index:100;
}

.logo{
  height:70px;
  width:70px;
  border-radius:50%;
  object-fit:cover;
}

.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:50px;
  padding:120px 5%;
}

.card{
  width:220px;
  background:var(--card);
  padding:25px;
  border-radius:25px;
  text-align:center;
  position:relative;
  transition:0.4s ease;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  border-radius:18px;
}

/* 🔥 TOOLTIP DESCRIPTION */
.tooltip{
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px;
  border-radius:10px;
  width:200px;
  font-size:12px;
  opacity:0;
  pointer-events:none;
  transition:0.3s ease;
}

.card:hover .tooltip{
  opacity:1;
}

/* CART BUTTON */
.cart{
  position:fixed;
  bottom:30px;
  right:30px;
  width:75px;
  height:75px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-weight:bold;
  font-size:20px;
}
</style>
</head>

<body>

<header>
  <img src="/logo.png" class="logo">
</header>

<section class="hero">
  <h1>Музыка. Стиль. Атмосфера.</h1>
</section>

<section class="products" id="products"></section>

<div class="cart" onclick="openCart()">🛒</div>

<script>
let cart = JSON.parse(localStorage.getItem("vinylCart")) || [];

async function loadProducts(){
  try{
    const res = await fetch('/api/products');
    let data = await res.json();

    const container = document.getElementById('products');
    container.innerHTML="";

    data.forEach(product=>{
      const name = product.title || product.name || "Vinyl";
      const price = product.price || 0;
      const image = product.image || "";
      const description = product.description || "Описание отсутствует";

      const card = document.createElement('div');
      card.className="card";

      card.innerHTML=`
        <img src="${image}">
        <h3>${name}</h3>
        <p>${price} ₽</p>
        <div class="tooltip">${description}</div>
        <button onclick='addToCart(${JSON.stringify(product)})'>+</button>
      `;

      container.appendChild(card);
    });

  }catch(e){
    console.log("API not found");
  }
}

function addToCart(product){
  cart.push(product);
  localStorage.setItem("vinylCart", JSON.stringify(cart));
}

function openCart(){
  window.location.href="cart.html";
}

loadProducts();
</script>

</body>
</html>
