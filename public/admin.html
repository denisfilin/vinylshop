<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin • Vinyl Shop</title>

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">
<link rel="icon" href="/logo.png">

<style>
:root{
  --bg:#000;
  --glass:rgba(0,0,0,0.6);
  --text:#fff;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#000;
  color:var(--text);
  overflow-x:hidden;
}

/* 🔥 Кирпичная стена */
.bg{
  position:fixed;
  inset:0;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-1;
}

header{
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  display:flex;
  align-items:center;
  gap:20px;
}

.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
}

h1{
  margin:0;
  font-size:22px;
}

.container{
  padding:40px 8%;
}

.glass{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:30px;
  margin-bottom:40px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}

.add-btn{
  background:#fff;
  color:#000;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  position:relative;
}

.card img{
  width:100%;
  border-radius:15px;
}

.delete{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:#fff;
  border-radius:50%;
  width:28px;
  height:28px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <img src="/logo.png" class="logo">
  <h1>Админ панель</h1>
</header>

<div class="container">

  <div class="glass">
    <h2>Добавить товар</h2>

    <input type="text" id="title" placeholder="Название">
    <input type="number" id="price" placeholder="Цена">
    <textarea id="description" placeholder="Описание"></textarea>
    <input type="text" id="image" placeholder="URL изображения">

    <button class="add-btn" onclick="addProduct()">Добавить</button>
  </div>

  <div class="glass">
    <h2>Список товаров</h2>
    <div class="products" id="products"></div>
  </div>

</div>

<script>
async function loadProducts(){
  const res = await fetch('/api/products');
  const data = await res.json();
  const container = document.getElementById("products");
  container.innerHTML="";

  data.forEach(product=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="delete" onclick="deleteProduct('${product.id}')">×</div>
      <img src="${product.image}">
      <h3>${product.title}</h3>
      <p>${product.price} ₽</p>
      <small>${product.description || ""}</small>
    `;

    container.appendChild(card);
  });
}

async function addProduct(){
  const title=document.getElementById("title").value;
  const price=document.getElementById("price").value;
  const description=document.getElementById("description").value;
  const image=document.getElementById("image").value;

  if(!title || !price || !image){
    alert("Заполните обязательные поля");
    return;
  }

  await fetch('/api/products',{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      id:Date.now().toString(),
      title,
      price,
      description,
      image
    })
  });

  document.getElementById("title").value="";
  document.getElementById("price").value="";
  document.getElementById("description").value="";
  document.getElementById("image").value="";

  loadProducts();
}

async function deleteProduct(id){
  await fetch('/api/products',{
    method:"DELETE",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ id })
  });

  loadProducts();
}

loadProducts();
</script>

</body>
</html>
