<script>

const SUPABASE_URL = "https://rmtcrasayikidqklhyfo.supabase.co"
const SUPABASE_KEY = "sb_publishable_LaKsiiHyowziPgGTl5CdWA_beMfguyx"
const ADMIN_EMAIL = "admin@vinylshop.ru"

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

/* 🔐 ПРОВЕРКА АВТОРИЗАЦИИ */
async function checkAuth(){
  const { data: { session } } = await client.auth.getSession()

  if(!session){
    showLogin()
    return
  }

  if(session.user.email !== ADMIN_EMAIL){
    alert("Нет доступа")
    await client.auth.signOut()
    showLogin()
    return
  }

  document.getElementById("loginScreen").style.display = "none"
  loadProducts()
}

/* 🔐 LOGIN */
async function login(){
  const email = document.getElementById("loginEmail").value
  const password = document.getElementById("loginPassword").value

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  })

  if(error){
    document.getElementById("loginError").textContent = error.message
    return
  }

  checkAuth()
}

/* 🔐 LOGOUT */
async function logout(){
  await client.auth.signOut()
  location.reload()
}

/* 📦 ЗАГРУЗКА */
async function loadProducts(){
  const { data, error } = await client.from("products").select("*")

  if(error){
    alert("Ошибка подключения")
    return
  }

  const container = document.getElementById("products")
  container.innerHTML=""

  data.forEach(product=>{
    const card=document.createElement("div")
    card.className="card"

    card.innerHTML=`
      <div class="delete" onclick="deleteProduct('${product.id}')">×</div>
      <img src="${product.image}">
      <h3>${product.title}</h3>
      <p>${product.price} ₽</p>
      <small>${product.description || ""}</small>
    `
    container.appendChild(card)
  })
}

/* ➕ ДОБАВЛЕНИЕ */
async function addProduct(){
  const title=document.getElementById("title").value.trim()
  const price=document.getElementById("price").value.trim()
  const description=document.getElementById("description").value.trim()
  const image=document.getElementById("image").value.trim()

  if(!title || !price || !image){
    alert("Заполните обязательные поля")
    return
  }

  const { error } = await client
    .from("products")
    .insert([{ title, price, description, image }])

  if(error){
    alert("Нет прав")
    return
  }

  document.getElementById("title").value=""
  document.getElementById("price").value=""
  document.getElementById("description").value=""
  document.getElementById("image").value=""

  loadProducts()
}

/* ❌ УДАЛЕНИЕ */
async function deleteProduct(id){
  const { error } = await client
    .from("products")
    .delete()
    .eq("id", id)

  if(error){
    alert("Нет прав")
    return
  }

  loadProducts()
}

/* 🔐 LOGIN SCREEN */
function showLogin(){
  document.body.innerHTML = `
  <div style="
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:15px;
  ">
    <h2 style="color:white;">Admin Login</h2>
    <input id="loginEmail" placeholder="Email" style="padding:10px;border-radius:10px;border:none;">
    <input id="loginPassword" type="password" placeholder="Password" style="padding:10px;border-radius:10px;border:none;">
    <button onclick="login()" style="padding:10px 20px;border-radius:20px;border:none;">Войти</button>
    <p id="loginError" style="color:red;"></p>
  </div>
  `
}

/* СТАРТ */
checkAuth()

</script>
