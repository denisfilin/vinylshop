<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- 🎧 VINYL FAVICON -->
<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --glass:rgba(255,255,255,0.08);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* 🔥 BRICK WALL */
.top-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  filter:brightness(0.5);
  z-index:-1;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  backdrop-filter:blur(25px);
  background:var(--glass);
}

.logo{
  height:80px;
  width:80px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.vinyl{
  width:200px;
  height:200px;
  border-radius:50%;
  margin-top:40px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 40%),
    radial-gradient(circle at center, #c00 10%, #111 11%, #000 60%);
  box-shadow:0 0 60px rgba(255,255,255,0.3);
  animation:spin 10s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* PRODUCTS */
.products{
  padding:120px 5%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:40px;
}

.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:25px;
  text-align:center;
  transition:.4s ease;
  position:relative;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.card img{
  width:100%;
  border-radius:18px;
}

button{
  margin-top:10px;
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* TOOLTIP */
.tooltip{
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:12px;
  border-radius:12px;
  width:220px;
  font-size:13px;
  opacity:0;
  transition:.3s ease;
}
.card:hover .tooltip{
  opacity:1;
}

/* CART BUTTON */
.cart{
  position:fixed;
  bottom:30px;
  right:30px;
  width:75px;
  height:75px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-weight:bold;
  font-size:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="top-bg"></div>

<header>
  <img src="/logo.png" class="logo">
</header>

<section class="hero">
  <h1>Музыка. Стиль. Атмосфера.</h1>
  <div class="vinyl"></div>
</section>

<section class="products" id="products"></section>

<div class="cart" onclick="window.location.href='cart.html'">🛒</div>

<script>
let cart = JSON.parse(localStorage.getItem("vinylCart")) || [];

async function loadProducts(){
  try{
    const res = await fetch('/api/products');
    const data = await res.json();

    const container = document.getElementById('products');
    container.innerHTML="";

    data.forEach(product=>{
      const card=document.createElement('div');
      card.className="card";

      card.innerHTML=`
        <img src="${product.image}">
        <h3>${product.title}</h3>
        <p>${product.price} ₽</p>
        <div class="tooltip">${product.description || ""}</div>
        <button onclick='addToCart(${JSON.stringify(product)})'>+</button>
      `;
      container.appendChild(card);
    });

  }catch(e){ console.log("API error"); }
}

function addToCart(product){
  cart.push(product);
  localStorage.setItem("vinylCart",JSON.stringify(cart));
}

loadProducts();
</script>

</body>
</html>
