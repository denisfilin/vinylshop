<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin - Vinyl Shop</title>

<!-- 🎧 Тот же favicon что и на основном сайте -->
<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">

<style>
:root {
  --bg: #f5f5f7;
  --card: rgba(255,255,255,0.7);
  --text: #1d1d1f;
  --accent: #0071e3;
}
.dark {
  --bg: #0f0f12;
  --card: rgba(30,30,35,0.6);
  --text: #ffffff;
  --accent: #4da3ff;
}
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s ease;
}
.container {
  max-width:1200px;
  margin:60px auto;
  padding:20px;
}
.glass {
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:25px;
  margin-bottom:30px;
  box-shadow:0 8px 32px rgba(0,0,0,0.1);
}
button {
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}
button:hover { opacity:0.9; }
input, textarea {
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-bottom:12px;
  background:rgba(255,255,255,0.5);
}
.dark input, .dark textarea {
  background:rgba(255,255,255,0.1);
  color:white;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}
.product img {
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}
.product-title { font-weight:600; }
.product-price { color:var(--accent); margin-bottom:8px; }
.stats { display:flex; gap:20px; }
.stat-box { flex:1; text-align:center; }
.drop-zone {
  border:2px dashed #aaa;
  padding:20px;
  text-align:center;
  border-radius:15px;
  margin-bottom:10px;
  cursor:pointer;
}
.drop-zone.dragover { border-color:var(--accent); }
</style>
</head>

<body>

<div class="container">

<div class="glass">
  <h1>Vinyl Shop — Admin Pro</h1>
  <button onclick="toggleTheme()">🌗 Переключить тему</button>
</div>

<div class="glass stats">
  <div class="stat-box">
    <h3 id="totalProducts">0</h3>
    <p>Товаров</p>
  </div>
  <div class="stat-box">
    <h3 id="totalValue">0 ₽</h3>
    <p>Общая стоимость</p>
  </div>
</div>

<div class="glass">
  <h3>Добавить товар</h3>
  <input id="titleInput" placeholder="Название" />
  <input id="priceInput" placeholder="Цена" />
  <input id="categoryInput" placeholder="Категория" />
  <textarea id="descriptionInput" placeholder="Описание"></textarea>

  <div class="drop-zone" id="dropZone">
    Перетащи изображение сюда или кликни
  </div>
  <input type="file" id="fileInput" hidden />
  <input id="imageInput" placeholder="Или вставь ссылку на изображение" />

  <button onclick="addProduct()">Добавить</button>
</div>

<div class="glass">
  <h3>Поиск и фильтр</h3>
  <input id="search" placeholder="Поиск..." oninput="loadProducts()" />
  <input id="filterCategory" placeholder="Фильтр по категории" oninput="loadProducts()" />
</div>

<div class="grid" id="products"></div>

</div>

<script>
let allProducts = [];

function toggleTheme(){
  document.body.classList.toggle('dark');
}

/* =========================
   УМНАЯ ЗАГРУЗКА БАЗЫ
========================= */
async function loadProducts(){
  try {
    const res = await fetch('/api/products');
    if(!res.ok) throw new Error("API not found");
    allProducts = await res.json();
  } catch(e) {
    console.warn("API не найдено — используем localStorage");
    allProducts = JSON.parse(localStorage.getItem("vinylProducts")) || [];
  }

  renderProducts();
}

function renderProducts(){
  const search = document.getElementById('search').value.toLowerCase();
  const filterCategory = document.getElementById('filterCategory').value.toLowerCase();

  const filtered = allProducts.filter(p =>
    (p.title || "").toLowerCase().includes(search) &&
    (p.category || "").toLowerCase().includes(filterCategory)
  );

  updateStats(filtered);

  const container = document.getElementById('products');
  container.innerHTML='';

  filtered.forEach(p=>{
    container.innerHTML+=`
      <div class="glass product">
        <img src="${p.image || ''}" />
        <div class="product-title">${p.title}</div>
        <div class="product-price">${p.price} ₽</div>
        <button onclick="deleteProduct(${p.id})">Удалить</button>
      </div>
    `;
  });
}

function updateStats(products){
  document.getElementById('totalProducts').innerText = products.length;
  const total = products.reduce((sum,p)=> sum + Number(p.price||0),0);
  document.getElementById('totalValue').innerText = total + " ₽";
}

/* =========================
   ДОБАВЛЕНИЕ ТОВАРА
========================= */
async function addProduct(){
  const title = titleInput.value.trim();
  const price = priceInput.value.trim();
  const category = categoryInput.value.trim();
  const description = descriptionInput.value.trim();
  const image = imageInput.value.trim();

  if(!title || !price) return alert("Название и цена обязательны");

  const newProduct = {
    id: Date.now(),
    title, price, category, description, image
  };

  try {
    await fetch('/api/add-product',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(newProduct)
    });
  } catch(e) {
    let local = JSON.parse(localStorage.getItem("vinylProducts")) || [];
    local.push(newProduct);
    localStorage.setItem("vinylProducts", JSON.stringify(local));
  }

  loadProducts();
}

/* =========================
   УДАЛЕНИЕ
========================= */
async function deleteProduct(id){
  try {
    await fetch(`/api/delete-product?id=${id}`,{method:'DELETE'});
  } catch(e) {
    let local = JSON.parse(localStorage.getItem("vinylProducts")) || [];
    local = local.filter(p=>p.id!==id);
    localStorage.setItem("vinylProducts", JSON.stringify(local));
  }
  loadProducts();
}

/* Drag & Drop */
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const imageInput = document.getElementById('imageInput');

dropZone.addEventListener('click',()=>fileInput.click());

fileInput.addEventListener('change', e=>{
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ()=> imageInput.value = reader.result;
  reader.readAsDataURL(file);
});

dropZone.addEventListener('dragover',e=>{
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));

dropZone.addEventListener('drop',e=>{
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  const reader = new FileReader();
  reader.onload = ()=> imageInput.value = reader.result;
  reader.readAsDataURL(file);
});

loadProducts();
</script>

</body>
</html>
