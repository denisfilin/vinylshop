<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin • Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="icon" href="/logo.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#000;
  --text:#fff;
  --glass:rgba(0,0,0,0.6);
}

body.light{
  --bg:#f5f5f5;
  --text:#000;
  --glass:rgba(255,255,255,0.6);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

.bg{
  position:fixed;
  inset:0;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-1;
}

header{
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
}

.container{
  padding:40px 8%;
}

.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:30px;
  margin-bottom:40px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
  position:relative;
}

.card img{
  width:100%;
  border-radius:15px;
}

.delete{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:#fff;
  border-radius:50%;
  width:28px;
  height:28px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.theme-toggle{
  cursor:pointer;
  font-size:18px;
}

.login-screen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.login-box{
  background:#111;
  padding:40px;
  border-radius:20px;
  width:300px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h3 style="color:white">Admin Login</h3>
    <input type="password" id="adminPassword" placeholder="Пароль">
    <button onclick="checkPassword()">Войти</button>
  </div>
</div>

<div class="bg"></div>

<header>
  <div style="display:flex;align-items:center;gap:15px">
    <img src="/logo.png" class="logo">
    <h2>Админка</h2>
  </div>
  <div class="theme-toggle" onclick="toggleTheme()">🌗</div>
</header>

<div class="container">

  <div class="glass">
    <h3>Добавить товар</h3>
    <input type="text" id="title" placeholder="Название">
    <input type="number" id="price" placeholder="Цена">
    <textarea id="description" placeholder="Описание"></textarea>
    <input type="text" id="image" placeholder="URL изображения">
    <button onclick="addProduct()">Добавить</button>
  </div>

  <div class="glass">
    <h3>Товары</h3>
    <div class="products" id="products"></div>
  </div>

</div>

<script>
// 🔥 ВСТАВЬ СВОИ ДАННЫЕ
const SUPABASE_URL = "https://rmtcrasayikidqklhyfo.supabase.co"
const SUPABASE_KEY = "sb_publishable_LaKsiiHyowziPgGTl5CdWA_beMfguyx"

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const ADMIN_PASSWORD = "Df221188" // можно поменять

function checkPassword(){
  const value = document.getElementById("adminPassword").value
  if(value === ADMIN_PASSWORD){
    document.getElementById("loginScreen").style.display="none"
  } else {
    alert("Неверный пароль")
  }
}

async function loadProducts(){
  const { data, error } = await supabase.from("products").select("*")
  const container = document.getElementById("products")
  container.innerHTML=""

  if(error){
    alert("Ошибка подключения к Supabase")
    return
  }

  data.forEach(product=>{
    const card=document.createElement("div")
    card.className="card"

    card.innerHTML=`
      <div class="delete" onclick="deleteProduct('${product.id}')">×</div>
      <img src="${product.image}">
      <h4>${product.title}</h4>
      <p>${product.price} ₽</p>
    `
    container.appendChild(card)
  })
}

async function addProduct(){
  const title=document.getElementById("title").value
  const price=document.getElementById("price").value
  const description=document.getElementById("description").value
  const image=document.getElementById("image").value

  const { error } = await supabase.from("products").insert([
    { title, price, description, image }
  ])

  if(error){
    alert("Ошибка добавления")
    return
  }

  loadProducts()
}

async function deleteProduct(id){
  const { error } = await supabase.from("products").delete().eq("id", id)
  if(error){
    alert("Ошибка удаления")
    return
  }

  loadProducts()
}

function toggleTheme(){
  document.body.classList.toggle("light")
}

loadProducts()
</script>

</body>
</html>
