<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin • Vinyl Shop</title>

<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<circle cx='50' cy='50' r='18' fill='red'/>
<circle cx='50' cy='50' r='5' fill='white'/>
</svg>">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#000;
  --glass:rgba(0,0,0,0.6);
  --text:#fff;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
}

.bg{
  position:fixed;
  inset:0;
  background:url('/brick-wall-background.avif') center/cover no-repeat;
  filter:brightness(0.4);
  z-index:-1;
}

header{
  padding:20px 40px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  display:flex;
  align-items:center;
  gap:20px;
}

.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
}

.container{
  padding:40px 8%;
}

.glass{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:30px;
  margin-bottom:40px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}

.add-btn{
  background:#fff;
  color:#000;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  position:relative;
}

.card img{
  width:100%;
  border-radius:15px;
}

.delete{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:#fff;
  border-radius:50%;
  width:28px;
  height:28px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <img src="/logo.png" class="logo">
  <h1>Админ панель</h1>
</header>

<div class="container">

  <div class="glass">
    <h2>Добавить товар</h2>

    <input id="title" placeholder="Название">
    <input id="price" type="number" placeholder="Цена">
    <textarea id="description" placeholder="Описание"></textarea>
    <input id="image" placeholder="URL изображения">

    <button class="add-btn" onclick="addProduct()">Добавить</button>
  </div>

  <div class="glass">
    <h2>Список товаров</h2>
    <div class="products" id="products"></div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://rmtcrasayikidqklhyfo.supabase.co"
const SUPABASE_KEY = "sb_publishable_LaKsiiHyowziPgGTl5CdWA_beMfguyx"
const ADMIN_EMAIL = "denis_filin@bk.ru"

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

/* 🔐 ПРОВЕРКА АВТОРИЗАЦИИ */
async function checkAuth(){
  const { data: { session } } = await client.auth.getSession()

  if(!session){
    showLogin()
    return
  }

  if(session.user.email !== ADMIN_EMAIL){
    alert("Нет доступа")
    await client.auth.signOut()
    showLogin()
    return
  }

  document.getElementById("loginScreen")?.remove()
  loadProducts()
}

/* 🔐 LOGIN */
async function login(){
  const email = document.getElementById("loginEmail").value
  const password = document.getElementById("loginPassword").value

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  })

  if(error){
    document.getElementById("loginError").textContent = error.message
    return
  }

  checkAuth()
}

/* 🔐 LOGOUT */
async function logout(){
  await client.auth.signOut()
  location.reload()
}

/* 📦 ЗАГРУЗКА */
async function loadProducts(){
  const { data, error } = await client.from("products").select("*")

  if(error){
    alert("Ошибка подключения")
    return
  }

  const container = document.getElementById("products")
  container.innerHTML=""

  data.forEach(product=>{
    const card=document.createElement("div")
    card.className="card"

    card.innerHTML=`
      <div class="delete" onclick="deleteProduct('${product.id}')">×</div>
      <img src="${product.image}">
      <h3>${product.title}</h3>
      <p>${product.price} ₽</p>
      <small>${product.description || ""}</small>
    `
    container.appendChild(card)
  })
}

/* ➕ ДОБАВЛЕНИЕ */
async function addProduct(){
  const title=document.getElementById("title").value.trim()
  const price=document.getElementById("price").value.trim()
  const description=document.getElementById("description").value.trim()
  const image=document.getElementById("image").value.trim()

  if(!title || !price || !image){
    alert("Заполните обязательные поля")
    return
  }

  const { error } = await client
    .from("products")
    .insert([{ title, price, description, image }])

  if(error){
    alert("Нет прав")
    return
  }

  document.getElementById("title").value=""
  document.getElementById("price").value=""
  document.getElementById("description").value=""
  document.getElementById("image").value=""

  loadProducts()
}

/* ❌ УДАЛЕНИЕ */
async function deleteProduct(id){
  const { error } = await client
    .from("products")
    .delete()
    .eq("id", id)

  if(error){
    alert("Нет прав")
    return
  }

  loadProducts()
}

/* 🔐 LOGIN SCREEN */
function showLogin(){
  document.body.innerHTML = `
  <div style="
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:15px;
  ">
    <h2 style="color:white;">Admin Login</h2>
    <input id="loginEmail" placeholder="Email" style="padding:10px;border-radius:10px;border:none;">
    <input id="loginPassword" type="password" placeholder="Password" style="padding:10px;border-radius:10px;border:none;">
    <button onclick="login()" style="padding:10px 20px;border-radius:20px;border:none;">Войти</button>
    <p id="loginError" style="color:red;"></p>
  </div>
  `
}

/* СТАРТ */
checkAuth()
</script>
</body>
</html>
