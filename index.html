<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
html {
  scroll-behavior: smooth;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 40px;
  z-index:1000;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:30px;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.hero::after{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom,rgba(0,0,0,0.3),#000);
  z-index:-1;
}

.hero-content{
  z-index:2;
}

.hero h1{
  font-size:56px;
  font-weight:800;
}

.hero p{
  margin-top:20px;
  opacity:0.8;
}

/* ВРАЩАЮЩАЯСЯ ПЛАСТИНКА */
.vinyl{
  margin-top:40px;
  width:180px;
  height:180px;
  border-radius:50%;
  background:
    radial-gradient(circle at center, #c00 10%, #111 11%, #000 60%);
  box-shadow:0 0 40px rgba(255,255,255,0.2);
  animation:spin 8s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* PRODUCTS */
.section{
  padding:100px 5%;
}

.section h2{
  font-size:32px;
  text-align:center;
  margin-bottom:40px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:20px;
  justify-items:center;
}

.card{
  width:120px;              /* уменьшено */
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:12px;
  padding:10px;
  transition:0.3s;
  text-align:center;
}

.card:hover{
  transform:translateY(-5px);
  background:rgba(255,255,255,0.1);
}

.card img{
  width:100%;
  border-radius:8px;
}

.card h3{
  font-size:12px;
  margin-top:8px;
}

.card span{
  font-size:11px;
  opacity:0.8;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  opacity:0.5;
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <!-- ВАЖНО: положи logo.png в ту же папку что и index.html -->
    <img src="./logo.png" alt="Vinyl Shop">
    <span>Vinyl Shop</span>
  </div>
</nav>

<section class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-vinyl-record-spinning-1902/1080p.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>Музыка. Стиль. Атмосфера.</h1>
    <p>Премиальные виниловые пластинки</p>

    <div class="vinyl"></div>
  </div>
</section>

<section class="section" id="catalog">
  <h2>Каталог</h2>
  <div class="products" id="products"></div>
</section>

<footer>
© 2026 Vinyl Shop
</footer>

<script>
async function loadProducts(){
  try{
    const res = await fetch('/api/products');
    const data = await res.json();
    const container=document.getElementById('products');
    container.innerHTML='';

    data.forEach(product=>{
      container.innerHTML+=`
        <div class="card">
          <img src="${product.image}">
          <h3>${product.name}</h3>
          <span>${product.price} ₽</span>
        </div>
      `;
    });
  }catch(e){
    console.log("Ошибка загрузки товаров");
  }
}

loadProducts();
</script>

</body>
</html>
