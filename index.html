<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vinyl Shop</h1>
        <p>Интернет‑магазин виниловых пластинок</p>
    </header>

    <main>
        <section class="products">
            <h2>Каталог</h2>
            <div class="product">
                <h3>Пример пластинки</h3>
                <p>Исполнитель — Альбом</p>
                <p class="price">2500 ₽</p>
                <button onclick="order()">Заказать</button>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Vinyl Shop</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
