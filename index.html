<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body {
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav {
  position:fixed;
  top:0;
  width:100%;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.5);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 50px;
  z-index:1000;
}

nav img {
  height:40px;
}

nav button {
  background:transparent;
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

nav button:hover {
  background:#fff;
  color:#000;
}

/* HERO */
.hero {
  position:relative;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

.hero video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.hero::after {
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom,rgba(0,0,0,0.2),#000);
  z-index:-1;
}

.hero-content {
  transform:translateY(0);
  transition:transform 0.2s ease-out;
}

.hero h1 {
  font-size:64px;
  font-weight:800;
}

.hero p {
  font-size:20px;
  margin-top:20px;
  opacity:0.8;
}

/* PRODUCTS */
.section {
  padding:120px 10%;
}

.section h2 {
  font-size:42px;
  margin-bottom:60px;
  text-align:center;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:40px;
}

.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  transition:0.4s;
}

.card:hover {
  transform:translateY(-10px);
  background:rgba(255,255,255,0.1);
}

.card img {
  width:100%;
  border-radius:15px;
}

.card h3 {
  margin-top:20px;
}

.card p {
  opacity:0.7;
}

.card span {
  display:block;
  margin-top:10px;
  font-weight:600;
}

/* FOOTER */
footer {
  text-align:center;
  padding:40px;
  background:#000;
  opacity:0.6;
}
</style>
</head>

<body>

<nav>
  <img src="Logo.png" alt="Vinyl Shop Logo">
  <button onclick="toggleLang()">EN</button>
</nav>

<section class="hero">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-vinyl-record-spinning-1902/1080p.mp4" type="video/mp4">
  </video>
  <div class="hero-content" id="heroContent">
    <h1 id="heroTitle">Музыка. Стиль. Атмосфера.</h1>
    <p id="heroText">Премиальные виниловые пластинки для настоящих ценителей.</p>
  </div>
</section>

<section class="section">
  <h2 id="catalogTitle">Каталог</h2>
  <div class="products" id="products"></div>
</section>

<footer>
  © 2026 Vinyl Shop
</footer>

<script>
// Параллакс hero
window.addEventListener("scroll", () => {
  const offset = window.pageYOffset;
  document.getElementById("heroContent").style.transform =
    "translateY(" + offset * 0.4 + "px)";
});

// Загрузка товаров
async function loadProducts(){
  const res = await fetch('/api/products');
  const data = await res.json();
  const container = document.getElementById('products');
  container.innerHTML='';

  data.forEach(product=>{
    container.innerHTML += `
      <div class="card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>${product.description || ''}</p>
        <span>${product.price} ₽</span>
      </div>
    `;
  });
}

loadProducts();

// Переключение языка
let lang='ru';

function toggleLang(){
  if(lang==='ru'){
    document.getElementById("heroTitle").innerText="Music. Style. Atmosphere.";
    document.getElementById("heroText").innerText="Premium vinyl records for true collectors.";
    document.getElementById("catalogTitle").innerText="Catalog";
    document.querySelector("nav button").innerText="RU";
    lang='en';
  } else {
    document.getElementById("heroTitle").innerText="Музыка. Стиль. Атмосфера.";
    document.getElementById("heroText").innerText="Премиальные виниловые пластинки для настоящих ценителей.";
    document.getElementById("catalogTitle").innerText="Каталог";
    document.querySelector("nav button").innerText="EN";
    lang='ru';
  }
}
</script>

</body>
</html>
