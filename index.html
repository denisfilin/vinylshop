<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --card:rgba(255,255,255,0.06);
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  position:relative;
}

/* 3D SCENE */
.scene{
  width:300px;
  height:300px;
  perspective:1000px;
  position:relative;
}

.vinyl{
  width:260px;
  height:260px;
  border-radius:50%;
  background:
    radial-gradient(circle at center,#c00 8%,#111 9%,#000 70%);
  position:absolute;
  top:20px;
  left:20px;
  animation:spin 8s linear infinite;
  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.2),
    0 20px 40px rgba(0,0,0,0.6);
}

.tonearm{
  width:200px;
  height:6px;
  background:#ccc;
  position:absolute;
  top:40px;
  left:120px;
  transform-origin:left center;
  transform:rotate(25deg);
  border-radius:4px;
}

.tonearm::after{
  content:'';
  width:20px;
  height:20px;
  background:#888;
  position:absolute;
  right:-10px;
  top:-7px;
  border-radius:50%;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* CATALOG */
.section{
  padding:80px 5%;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:20px;
  justify-items:center;
}

/* уменьшили в 4 раза */
.card{
  width:100px;
  background:var(--card);
  padding:8px;
  border-radius:12px;
  text-align:center;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:8px;
}

.card h3{
  font-size:10px;
}

.card p{
  font-size:9px;
  opacity:0.7;
}

/* FLOATING CART */
.cart{
  position:fixed;
  right:30px;
  bottom:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.3s;
}

.cart:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<section class="hero">
  <h1>Vinyl Shop</h1>

  <div class="scene">
    <div class="vinyl"></div>
    <div class="tonearm"></div>
  </div>
</section>

<section class="section">
  <h2>Каталог</h2>
  <div class="products" id="products"></div>
</section>

<div class="cart" onclick="openCart()">
🛒
</div>

<script>
let cart=[];

async function loadProducts(){
  const res=await fetch('/api/products');
  const data=await res.json();
  const container=document.getElementById('products');

  data.forEach(product=>{
    container.innerHTML+=`
      <div class="card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>${product.price} ₽</p>
        <button onclick='addToCart(${JSON.stringify(product)})'>+</button>
      </div>
    `;
  });
}

function addToCart(product){
  cart.push(product);
  document.querySelector('.cart').innerText="🛒 "+cart.length;
}

function openCart(){
  alert("В корзине товаров: "+cart.length);
}

loadProducts();
</script>

</body>
</html>
