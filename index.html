<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --card:rgba(255,255,255,0.06);
}

body.light{
  --bg:#f5f5f7;
  --text:#111;
  --card:rgba(0,0,0,0.05);
}

html{scroll-behavior:smooth;}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  transition:0.4s;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:0.6s;
}

.loader-disc{
  width:120px;
  height:120px;
  border-radius:50%;
  background:
    radial-gradient(circle at center, #c00 8%, #111 9%, #000 60%);
  box-shadow:0 0 40px rgba(255,255,255,0.3);
  animation:spin 2s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.4);
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  z-index:1000;
}

button{
  background:transparent;
  border:1px solid var(--text);
  color:var(--text);
  padding:8px 18px;
  border-radius:30px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.3s;
}

/* MAGNETIC BUTTON */
button:hover{
  transform:scale(1.1);
  background:var(--text);
  color:var(--bg);
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

.layer{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  will-change:transform;
}

.bg1{
  background:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');
  opacity:0.3;
}

.bg2{
  background:url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4');
  opacity:0.15;
}

.hero-content{
  position:relative;
  z-index:10;
}

/* 3D VINYL */
.vinyl{
  margin:40px auto;
  width:220px;
  height:220px;
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, #d00 0 8%, #111 9%, #000 70%);
  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.2),
    0 20px 40px rgba(0,0,0,0.6);
  animation:spin 10s linear infinite;
  position:relative;
  transform-style:preserve-3d;
}

.vinyl::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:50%;
  background:linear-gradient(120deg,rgba(255,255,255,0.4),transparent);
  mix-blend-mode:overlay;
}

/* SECTION */
.section{
  padding:120px 8%;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:30px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(20px);
  padding:15px;
  border-radius:16px;
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}

.card.visible{
  opacity:1;
  transform:translateY(0);
}

.card img{
  width:100%;
  border-radius:12px;
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(60px);
  transition:1s;
}

.reveal.visible{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div id="loader">
  <div class="loader-disc"></div>
</div>

<nav>
  <div>Vinyl Shop</div>
  <button onclick="toggleTheme()">Theme</button>
</nav>

<section class="hero">
  <div class="layer bg1" data-speed="0.2"></div>
  <div class="layer bg2" data-speed="0.5"></div>

  <div class="hero-content reveal">
    <h1>Музыка. Стиль. Атмосфера.</h1>
    <div class="vinyl"></div>
    <button onclick="scrollToCatalog()">Каталог</button>
  </div>
</section>

<section class="section" id="catalog">
  <h2 class="reveal">Каталог</h2>
  <div class="products" id="products"></div>
</section>

<script>
// LOADER
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.opacity="0";
    setTimeout(()=>loader.remove(),600);
  },800);
});

// THEME
function toggleTheme(){
  document.body.classList.toggle("light");
}

// PARALLAX
window.addEventListener("scroll",()=>{
  document.querySelectorAll(".layer").forEach(layer=>{
    const speed=layer.getAttribute("data-speed");
    layer.style.transform=`translateY(${window.scrollY * speed}px)`;
  });
});

// REVEAL EFFECT
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
},{threshold:0.2});

document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

// PRODUCTS LOAD
async function loadProducts(){
  const res=await fetch('/api/products');
  const data=await res.json();
  const container=document.getElementById("products");

  data.forEach(product=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${product.image}">
      <h3>${product.name}</h3>
      <p>${product.price} ₽</p>
    `;
    container.appendChild(div);
    observer.observe(div);
  });
}

loadProducts();

function scrollToCatalog(){
  document.getElementById("catalog").scrollIntoView();
}
</script>

</body>
</html>
